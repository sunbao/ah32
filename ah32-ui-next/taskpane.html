<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闃胯洡 - 鏅鸿兘鍔╂墜</title>
</head>
<body>
  <div id="app"></div>
  <div id="boot-status" style="padding:12px;font-size:12px;color:#334155;font-family:Segoe UI, Arial, sans-serif;white-space:pre-wrap;">
    姝ｅ湪鍔犺浇鍔╂墜...
  </div>

  <!-- Optional runtime config (generated by installer / local deployment). -->
  <script src="config.js" onerror="try{console.warn('[taskpane] config.js not found')}catch(e){}"></script>

  <script>
    (function () {
      function normalizeQuery(raw) {
        try {
          var s = String(raw || '').trim()
          if (!s) return ''
          return s.charAt(0) === '?' ? s : ('?' + s)
        } catch (e) {
          return ''
        }
      }

      function readTargetQuery() {
        try {
          var storage = window.Application && window.Application.PluginStorage
          if (storage && typeof storage.getItem === 'function') {
            var stored = normalizeQuery(storage.getItem('ah32_taskpane_query'))
            if (stored) return stored
          }
        } catch (e) {
          // ignore
        }
        try {
          var cfg = window.__AH32_CONFIG__ || null
          return normalizeQuery(cfg && cfg.taskpaneQuery ? cfg.taskpaneQuery : '')
        } catch (e) {
          return ''
        }
      }

      function currentQuery() {
        try {
          return normalizeQuery(location && location.search ? location.search : '')
        } catch (e) {
          return ''
        }
      }

      function readBenchRequestQueryFromDocVar() {
        try {
          var app = window.Application || null
          var doc = app && app.ActiveDocument ? app.ActiveDocument : null
          var vars = doc && doc.Variables ? doc.Variables : null
          if (!vars) return ''
          var raw = ''
          try { raw = String(vars.Item('AH32_DEV_BENCH_REQUEST').Value || '').trim() } catch (e0) { raw = '' }
          if (!raw) return ''
          var parsed = JSON.parse(raw)
          if (!parsed || parsed.enabled !== true) return ''
          var params = new URLSearchParams()
          params.set('ah32_force_dev', '1')
          params.set('ah32_dev_bench', '1')
          params.set('ah32_dev_kiosk', 'bench')
          if (parsed.runMode) params.set('ah32_dev_bench_mode', String(parsed.runMode))
          if (parsed.suiteId) params.set('ah32_dev_bench_suite', String(parsed.suiteId))
          if (parsed.preset) params.set('ah32_dev_bench_preset', String(parsed.preset))
          if (parsed.action) params.set('ah32_dev_bench_action', String(parsed.action))
          if (Array.isArray(parsed.storyIds) && parsed.storyIds.length) params.set('ah32_dev_bench_story_ids', parsed.storyIds.join(','))
          if (parsed.onceKey) params.set('ah32_dev_bench_once', String(parsed.onceKey))
          return normalizeQuery(params.toString())
        } catch (e) {
          return ''
        }
      }

      function maybeReloadFromPluginStorage() {
        try {
          var target = readTargetQuery() || readBenchRequestQueryFromDocVar()
          if (!target) return
          var current = currentQuery()
          if (target === current) return
          var nextUrl = String(location.pathname || '/taskpane.html') + target + String(location.hash || '')
          try { console.log('[taskpane] query changed, reload to', nextUrl) } catch (e0) {}
          location.replace(nextUrl)
        } catch (e) {
          try { console.warn('[taskpane] query sync failed', e) } catch (e1) {}
        }
      }

      try {
        maybeReloadFromPluginStorage()
        window.__ah32_syncTaskpaneQueryFromPluginStorage = maybeReloadFromPluginStorage
        window.setInterval(maybeReloadFromPluginStorage, 1200)
      } catch (e) {
        try { console.warn('[taskpane] query sync init failed', e) } catch (e2) {}
      }
    })()
  </script>

  <!-- 浠诲姟绐楁牸閿欒鎹曡幏 - 渚夸簬鐧藉睆鍚庡畾浣嶅師鍥?-->
  <script>
    (function () {
      var ERROR_KEY = 'ah32_last_error'
      var DIAG_KEY = 'ah32_reload_diag_v1'
      var overlayId = 'ah32-fatal-error-overlay'
      var BOOT_ID_KEY = 'ah32_boot_id_v1'
      var BOOT_SEQ_KEY = 'ah32_boot_seq_v1'
      var bootId = ''
      var bootSeq = 0

      function _readLocalStorage(key) {
        try { return localStorage.getItem(key) } catch (e) { return '' }
      }

      function _resolveClientId() {
        try {
          return String(_readLocalStorage('ah32_client_id') || _readLocalStorage('ah32_client_id_v1') || '').trim()
        } catch (e) {
          return ''
        }
      }

      function _genBootId() {
        try {
          if (typeof crypto !== 'undefined' && crypto && typeof crypto.randomUUID === 'function') {
            return 'boot_' + String(crypto.randomUUID())
          }
        } catch (e) {}
        return 'boot_' + String(Date.now()) + '_' + Math.random().toString(36).slice(2, 10)
      }

      function _bumpBootSeq() {
        try {
          var raw = String(_readLocalStorage(BOOT_SEQ_KEY) || '0')
          var n = parseInt(raw, 10)
          if (!isFinite(n)) n = 0
          n = n + 1
          localStorage.setItem(BOOT_SEQ_KEY, String(n))
          return n
        } catch (e) {
          return 0
        }
      }

      try {
        bootSeq = _bumpBootSeq()
        bootId = _genBootId()
        try { localStorage.setItem(BOOT_ID_KEY, bootId) } catch (e) {}
        try { window.__AH32_BOOT_ID__ = bootId } catch (e) {}
      } catch (e) {
        bootId = ''
        bootSeq = 0
      }

      function _readRuntimeConfig() {
        try {
          if (typeof window === 'undefined') return null
          return window.__AH32_CONFIG__ || null
        } catch (e) {
          return null
        }
      }

      function _resolveApiBase() {
        try {
          var cfg = _readRuntimeConfig()
          var fromCfg = cfg && cfg.apiBase ? String(cfg.apiBase || '').trim() : ''
          if (fromCfg && /^https?:\/\//i.test(fromCfg)) return fromCfg.replace(/\/+$/, '')

          var v = String(_readLocalStorage('ah32_api_base_v1') || '').trim()
          if (v && /^https?:\/\//i.test(v)) return v.replace(/\/+$/, '')
        } catch (e) {}
        return 'http://127.0.0.1:5123'
      }

      function _resolveApiKey() {
        try {
          var cfg = _readRuntimeConfig()
          var fromCfg = cfg && cfg.apiKey ? String(cfg.apiKey || '').trim() : ''
          if (fromCfg) return fromCfg
          return String(_readLocalStorage('ah32_api_key_v1') || '').trim()
        } catch (e) {
          return ''
        }
      }

      function reportTaskpaneError(scope, error, level) {
        var lv = level || 'warning'
        var msg = ''
        try {
          msg = (error && error.message) ? String(error.message) : String(error || '')
        } catch (e0) {
          msg = 'unknown error'
          try { console.warn('[taskpane] reportTaskpaneError parse failed', e0) } catch (e00) { console.error(e00) }
        }
        try { console.warn('[taskpane][' + String(scope || 'unknown') + ']', msg, error) } catch (e1) { console.error(e1) }
        try {
          if (typeof window !== 'undefined' && typeof window.__ah32_reportError === 'function') {
            window.__ah32_reportError('ah32-ui-next/taskpane.html:' + String(scope || 'unknown'), error, lv)
            return
          }
        } catch (e2) {
          try { console.warn('[taskpane] __ah32_reportError failed', e2) } catch (e22) { console.error(e22) }
        }
        try {
          var apiBase = _resolveApiBase()
          var url = apiBase + '/api/log?level=' + encodeURIComponent(lv)
            + '&boot_id=' + encodeURIComponent(String(bootId || ''))
            + '&boot_seq=' + encodeURIComponent(String(bootSeq || 0))
            + '&client_id=' + encodeURIComponent(_resolveClientId())
            + '&message=' + encodeURIComponent('[taskpane][' + String(scope || 'unknown') + '] ' + msg)
          fetch(url, { method: 'GET' }).catch(function (e3) {
            try { console.warn('[taskpane] /api/log failed', e3) } catch (e33) { console.error(e33) }
          })
        } catch (e4) {
          try { console.warn('[taskpane] reportTaskpaneError fallback failed', e4) } catch (e44) { console.error(e44) }
        }
      }

      try {
        window.__ah32_reportTaskpaneError = reportTaskpaneError
        // Back-compat: some later script tags call `reportTaskpaneError(...)` directly.
        window.reportTaskpaneError = reportTaskpaneError
      } catch (e5) {
        reportTaskpaneError('bind_global_reporter', e5, 'warning')
      }

      try {
        window.__ah32_resolveApiBase = _resolveApiBase
        window.__ah32_resolveApiKey = _resolveApiKey
      } catch (e6) {
        reportTaskpaneError('bind_global_resolvers', e6, 'warning')
      }

      function safeJsonParse(text) {
        try { return JSON.parse(text) } catch (e) { return null }
      }

      function readJson(key) {
        try {
          return safeJsonParse(localStorage.getItem(key) || '') || null
        } catch (e) {
          return null
        }
      }

      function writeJson(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value))
        } catch (e) { reportTaskpaneError('writeJson', e, 'warning') }
      }

      function getNavigationType() {
        try {
          var nav = performance && performance.getEntriesByType ? performance.getEntriesByType('navigation')[0] : null
          return nav && nav.type ? nav.type : 'unknown'
        } catch (e) {
          return 'unknown'
        }
      }

      function buildMessage(type, message, extra) {
        var time = new Date().toISOString()
        var detail = {
          type: type,
          message: message || '',
          extra: extra || '',
          time: time
        }
        try {
          localStorage.setItem(ERROR_KEY, JSON.stringify(detail))
        } catch (e) { reportTaskpaneError('buildMessage', e, 'warning') }
        return detail
      }

      function recordDiag(fields) {
        var diag = readJson(DIAG_KEY) || {}
        for (var k in fields) {
          diag[k] = fields[k]
        }
        writeJson(DIAG_KEY, diag)
        return diag
      }

      function recordCrash(type, message, extra) {
        var detail = buildMessage(type, message, extra)
        recordDiag({
          lastCrashAt: detail.time,
          lastCrashType: detail.type,
          lastCrashMessage: detail.message,
          lastCrashExtra: detail.extra
        })
        return detail
      }

      function renderLastDiag() {
        var boot = document.getElementById('boot-status')
        if (!boot) return

        var diag = readJson(DIAG_KEY)
        if (!diag) return

        // Only surface recent crashes/reloads; keep this lightweight.
        var parts = ['姝ｅ湪鍔犺浇鍔╂墜...']
        if (diag.lastUnloadAt) parts.push('涓婃閫€鍑? ' + diag.lastUnloadAt)
        if (diag.lastNavigationType) parts.push('涓婃瀵艰埅: ' + diag.lastNavigationType)
        if (diag.lastCrashAt) {
          parts.push('涓婃寮傚父: ' + diag.lastCrashAt)
          parts.push('寮傚父绫诲瀷: ' + (diag.lastCrashType || 'unknown'))
          parts.push('寮傚父淇℃伅: ' + (diag.lastCrashMessage || ''))
        }

        // Avoid replacing an existing richer message (e.g. load failure notice).
        boot.textContent = parts.join('\n')
      }

      function showOverlay(detail) {
        try {
          if (document.getElementById(overlayId)) {
            return
          }
          var overlay = document.createElement('div')
          overlay.id = overlayId
          overlay.style.cssText = [
            'position:fixed',
            'inset:0',
            'background:#fff3f3',
            'color:#7f1d1d',
            'z-index:99999',
            'padding:16px',
            'font-family:Segoe UI, Arial, sans-serif',
            'font-size:12px',
            'line-height:1.5',
            'white-space:pre-wrap'
          ].join(';')
          var title = '任务窗格发生错误（请截图反馈）'
          var content = [
            title,
            '时间: ' + detail.time,
            '类型: ' + detail.type,
            '信息: ' + (detail.message || ''),
            detail.extra ? '详情: ' + detail.extra : ''
          ].filter(Boolean).join('\n')
          overlay.textContent = content
          document.body.appendChild(overlay)
        } catch (e) { reportTaskpaneError('showOverlay', e, 'error') }
      }

      // Track loads/unloads for "taskpane reload diagnosis".
      recordDiag({
        bootId: bootId || '',
        bootSeq: bootSeq || 0,
        lastLoadAt: new Date().toISOString(),
        lastNavigationType: getNavigationType()
      })
      renderLastDiag()

      try {
        var apiBase = _resolveApiBase()
        var msg = '[BOOT] phase=taskpane_load boot_id=' + String(bootId || '') + ' boot_seq=' + String(bootSeq || 0)
          + ' nav=' + String(getNavigationType())
        try {
          var lastErr = String(_readLocalStorage(ERROR_KEY) || '')
          if (lastErr) msg = msg + ' last_error=' + lastErr.slice(0, 260)
        } catch (e0) {}
        try {
          var diagRaw = String(_readLocalStorage(DIAG_KEY) || '')
          if (diagRaw) msg = msg + ' diag=' + diagRaw.slice(0, 520)
        } catch (e1) {}
        var url = apiBase + '/api/log?level=info'
          + '&boot_id=' + encodeURIComponent(String(bootId || ''))
          + '&boot_seq=' + encodeURIComponent(String(bootSeq || 0))
          + '&client_id=' + encodeURIComponent(_resolveClientId())
          + '&message=' + encodeURIComponent(msg.slice(0, 900))
        fetch(url, { method: 'GET' }).catch(function (e2) {
          try { console.warn('[taskpane] boot /api/log failed', e2) } catch (e22) { console.error(e22) }
        })
      } catch (e3) {
        reportTaskpaneError('boot_log', e3, 'warning')
      }

      function _safeVisibilityState() {
        try {
          if (typeof document !== 'undefined' && document && document.visibilityState) {
            return String(document.visibilityState)
          }
        } catch (e) {}
        return ''
      }

      function _writeDiagLife(patch) {
        try { recordDiag(patch || {}) } catch (e) { reportTaskpaneError('diag_lifecycle', e, 'warning') }
      }

      function _logLife(level, msg) {
        try {
          var apiBase = _resolveApiBase()
          var url = apiBase + '/api/log?level=' + encodeURIComponent(String(level || 'info'))
            + '&boot_id=' + encodeURIComponent(String(bootId || ''))
            + '&boot_seq=' + encodeURIComponent(String(bootSeq || 0))
            + '&client_id=' + encodeURIComponent(_resolveClientId())
            + '&message=' + encodeURIComponent(String(msg || '').slice(0, 900))
          fetch(url, { method: 'GET' }).catch(function (e2) {
            try { console.warn('[taskpane] lifecycle /api/log failed', e2) } catch (e22) { console.error(e22) }
          })
        } catch (e) {
          reportTaskpaneError('lifecycle_log', e, 'warning')
        }
      }

      // Keep a lightweight heartbeat in localStorage so BOOT diag can show recent liveness.
      // IMPORTANT: Avoid writing too frequently. Some WPS WebViews are sensitive to sync localStorage churn.
      // Do NOT send network logs here (avoid log spam).
      try {
        var hbSeq = 0
        var maxHeapMb = null
        setInterval(function () {
          hbSeq = hbSeq + 1
          var usedMb = null
          try {
            var pm = performance && performance.memory ? performance.memory : null
            if (pm && typeof pm.usedJSHeapSize === 'number') {
              usedMb = Math.round(pm.usedJSHeapSize / 1024 / 1024)
            }
          } catch (e) { usedMb = null }
          try {
            if (typeof usedMb === 'number' && (typeof maxHeapMb !== 'number' || usedMb > maxHeapMb)) {
              maxHeapMb = usedMb
            }
          } catch (e) {}
          _writeDiagLife({
            lastHeartbeatAt: new Date().toISOString(),
            lastHeartbeatSeq: hbSeq,
            lastVisibilityState: _safeVisibilityState(),
            lastOnline: (typeof navigator !== 'undefined' && typeof navigator.onLine === 'boolean') ? navigator.onLine : null,
            lastJsHeapUsedMb: usedMb,
            maxJsHeapUsedMb: maxHeapMb
          })
        }, 5000)
      } catch (e) {
        reportTaskpaneError('heartbeat_init', e, 'warning')
      }

      try {
        document.addEventListener('visibilitychange', function () {
          var st = _safeVisibilityState()
          _writeDiagLife({ lastVisibilityChangeAt: new Date().toISOString(), lastVisibilityState: st })
          _logLife('info', '[LIFECYCLE] visibilitychange state=' + st)
        })
      } catch (e) {
        reportTaskpaneError('bind_visibilitychange', e, 'warning')
      }

      window.addEventListener('pagehide', function (event) {
        var st = _safeVisibilityState()
        var persisted = false
        try { persisted = !!(event && event.persisted) } catch (e) { persisted = false }
        _writeDiagLife({
          lastPagehideAt: new Date().toISOString(),
          lastUnloadAt: new Date().toISOString(),
          lastVisibilityState: st,
          lastPagehidePersisted: persisted
        })
        _logLife('info', '[LIFECYCLE] pagehide persisted=' + (persisted ? '1' : '0') + ' state=' + st)
      })

      try {
        window.addEventListener('beforeunload', function () {
          var st = _safeVisibilityState()
          _writeDiagLife({ lastBeforeUnloadAt: new Date().toISOString(), lastVisibilityState: st })

          // Include lightweight diag fields to help root-cause "auto reload" (non-user reloads) on WPS webviews.
          var heapMb = ''
          var hbSeq2 = ''
          var online2 = ''
          var inflightPlan = ''
          var inflightChat = ''
          var heapMaxMb = ''

          // Prefer direct sampling at unload time (more accurate than the last heartbeat).
          try {
            var pm2 = performance && performance.memory ? performance.memory : null
            if (pm2 && typeof pm2.usedJSHeapSize === 'number') {
              heapMb = String(Math.round(pm2.usedJSHeapSize / 1024 / 1024))
            }
          } catch (e) {}
          try {
            var diag2 = readJson(DIAG_KEY) || null
            if (diag2 && typeof diag2 === 'object') {
              try {
                if (!heapMb && typeof diag2.lastJsHeapUsedMb === 'number') heapMb = String(diag2.lastJsHeapUsedMb)
              } catch (e) {}
              try { if (typeof diag2.maxJsHeapUsedMb === 'number') heapMaxMb = String(diag2.maxJsHeapUsedMb) } catch (e) {}
              try { if (typeof diag2.lastHeartbeatSeq === 'number') hbSeq2 = String(diag2.lastHeartbeatSeq) } catch (e) {}
              try { if (typeof diag2.lastOnline === 'boolean') online2 = diag2.lastOnline ? '1' : '0' } catch (e) {}
              try {
                var ip = diag2.inflight_plan
                if (ip && typeof ip === 'object') {
                  inflightPlan = String(ip.stage || ip.at || '1')
                }
              } catch (e) {}
              try {
                var ic = diag2.inflight_chat
                if (ic && typeof ic === 'object') {
                  inflightChat = String(ic.stage || ic.at || '1')
                }
              } catch (e) {}
            }
          } catch (e) {}

          var msg2 = '[LIFECYCLE] beforeunload state=' + st
          if (heapMb) msg2 = msg2 + ' heap_mb=' + heapMb
          if (heapMaxMb) msg2 = msg2 + ' heap_max_mb=' + heapMaxMb
          if (hbSeq2) msg2 = msg2 + ' hb_seq=' + hbSeq2
          if (online2) msg2 = msg2 + ' online=' + online2
          if (inflightPlan) msg2 = msg2 + ' inflight_plan=' + inflightPlan
          if (inflightChat) msg2 = msg2 + ' inflight_chat=' + inflightChat

          _logLife('info', msg2)
        })
      } catch (e) {
        reportTaskpaneError('bind_beforeunload', e, 'warning')
      }

      try {
        window.addEventListener('unload', function () {
          var st = _safeVisibilityState()
          _writeDiagLife({ lastUnloadAt: new Date().toISOString(), lastVisibilityState: st })
          _logLife('info', '[LIFECYCLE] unload state=' + st)
        })
      } catch (e) {
        reportTaskpaneError('bind_unload', e, 'warning')
      }

      // Page Lifecycle (best-effort; not all WPS runtimes support it).
      try {
        window.addEventListener('freeze', function () {
          var st = _safeVisibilityState()
          _writeDiagLife({ lastFreezeAt: new Date().toISOString(), lastVisibilityState: st })
          _logLife('info', '[LIFECYCLE] freeze state=' + st)
        })
        window.addEventListener('resume', function () {
          var st = _safeVisibilityState()
          _writeDiagLife({ lastResumeAt: new Date().toISOString(), lastVisibilityState: st })
          _logLife('info', '[LIFECYCLE] resume state=' + st)
        })
      } catch (e) {
        reportTaskpaneError('bind_freeze_resume', e, 'warning')
      }

      try {
        window.addEventListener('blur', function () {
          var st = _safeVisibilityState()
          _writeDiagLife({ lastBlurAt: new Date().toISOString(), lastVisibilityState: st })
          _logLife('info', '[LIFECYCLE] blur state=' + st)
        })
        window.addEventListener('focus', function () {
          var st = _safeVisibilityState()
          _writeDiagLife({ lastFocusAt: new Date().toISOString(), lastVisibilityState: st })
          _logLife('info', '[LIFECYCLE] focus state=' + st)
        })
      } catch (e) {
        reportTaskpaneError('bind_focus_blur', e, 'warning')
      }

      window.addEventListener('error', function (event) {
        var stack = ''
        try {
          stack = event && event.error && event.error.stack ? String(event.error.stack) : ''
        } catch (e) {
          stack = ''
        }
        var extra = ''
        try {
          extra = JSON.stringify({
            href: location.href,
            filename: event && event.filename ? String(event.filename) : '',
            lineno: event && typeof event.lineno === 'number' ? event.lineno : null,
            colno: event && typeof event.colno === 'number' ? event.colno : null,
            stack: stack
          }).slice(0, 5000)
        } catch (e) {
          extra = stack
        }
        var detail = recordCrash(
          'error',
          event.message,
          extra
        )
        try {
          var apiBase = _resolveApiBase()
          var apiKey = _resolveApiKey()
          fetch(apiBase + '/agentic/error/report', {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, apiKey ? { 'X-API-Key': apiKey } : {}),
            body: JSON.stringify({
              error_type: 'frontend_error',
              error_message: detail.message || event.message || '',
              error_code: '',
              correction_suggestion: '请截图反馈给开发，后台日志里可以继续追踪。',
              user_context: JSON.stringify({ boot_id: bootId || '', boot_seq: bootSeq || 0, href: location.href, extra: detail.extra || '' }).slice(0, 5000),
              severity: 'high'
            })
          }).catch(function (e) { reportTaskpaneError('window.error.report.fetch', e, 'warning') })
        } catch (e) { reportTaskpaneError('window.error.report', e, 'warning') }
        showOverlay(detail)
        try {
          if (event && typeof event.preventDefault === 'function') {
            event.preventDefault()
          }
        } catch (e) { reportTaskpaneError('window.error.preventDefault', e, 'warning') }
      })

      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason
        var message = reason && reason.message ? reason.message : String(reason)
        var extra = reason && reason.stack ? reason.stack : ''
        var detail = recordCrash('unhandledrejection', message, extra)
        try {
          var apiBase = _resolveApiBase()
          var apiKey = _resolveApiKey()
          fetch(apiBase + '/agentic/error/report', {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, apiKey ? { 'X-API-Key': apiKey } : {}),
            body: JSON.stringify({
              error_type: 'frontend_unhandledrejection',
              error_message: message || '',
              error_code: '',
              correction_suggestion: '请截图反馈给开发，后台日志里可以继续追踪。',
              user_context: JSON.stringify({ href: location.href, stack: extra || '' }).slice(0, 5000),
              severity: 'high'
            })
          }).catch(function (e) { reportTaskpaneError('unhandledrejection.report.fetch', e, 'warning') })
        } catch (e) { reportTaskpaneError('unhandledrejection.report', e, 'warning') }
        showOverlay(detail)
        try {
          if (event && typeof event.preventDefault === 'function') {
            event.preventDefault()
          }

  <script>
    (function () {
      var READY_KEY = '__AH32_APP_READY__'
      var app = document.getElementById('app')
      var boot = document.getElementById('boot-status')

      function hideBoot() {
        if (boot) {
          boot.style.display = 'none'
        }
      }

      function showBoot(text) {
        if (boot) {
          boot.textContent = text
          boot.style.display = 'block'
        }
      }

      function checkMounted() {
        if (window[READY_KEY] || (app && app.childElementCount > 0)) {
          hideBoot()
          return true
        }
        return false
      }

      setTimeout(function () {
        if (!checkMounted()) {
          showBoot('助手加载失败，请检查 Vite 服务是否正常运行并保持连接。')
        }
      }, 5000)

      if (app && typeof MutationObserver !== 'undefined') {
        var observer = new MutationObserver(function () {
          if (app.childElementCount === 0) {
            showBoot('助手页面已被清空，请截图反馈。')
          } else {
            hideBoot()
          }
        })
        observer.observe(app, { childList: true })
      }
    })()
