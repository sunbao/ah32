<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Supported WPS hosts</title>
  <desc id="desc">Writer, ET, and WPP support overview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6efe5"/>
      <stop offset="100%" stop-color="#eadfcb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#5e5143" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="68" y="76" fill="#163845" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Supported WPS Hosts</text>
  <text x="68" y="114" fill="#57686b" font-size="20" font-family="Segoe UI, Arial, sans-serif">One product surface, three host-specific execution paths.</text>

  <g filter="url(#shadow)">
    <rect x="68" y="164" width="320" height="280" rx="24" fill="#fffaf2" stroke="#d8c6a7"/>
    <rect x="440" y="164" width="320" height="280" rx="24" fill="#fffaf2" stroke="#d8c6a7"/>
    <rect x="812" y="164" width="320" height="280" rx="24" fill="#fffaf2" stroke="#d8c6a7"/>
  </g>

  <text x="98" y="220" fill="#163845" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Writer</text>
  <text x="98" y="260" fill="#5b6668" font-size="19" font-family="Segoe UI, Arial, sans-serif">Document analysis, rewrite, formatting, answer-mode, block lifecycle.</text>
  <text x="98" y="314" fill="#9b5620" font-size="18" font-family="Segoe UI, Arial, sans-serif">Typical output</text>
  <text x="98" y="344" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- structure reports</text>
  <text x="98" y="372" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- comparison tables</text>
  <text x="98" y="400" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- styled writeback blocks</text>

  <text x="470" y="220" fill="#163845" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">ET</text>
  <text x="470" y="260" fill="#5b6668" font-size="19" font-family="Segoe UI, Arial, sans-serif">Spreadsheet-oriented execution: structured sheets, summaries, charts, and data transforms.</text>
  <text x="470" y="314" fill="#9b5620" font-size="18" font-family="Segoe UI, Arial, sans-serif">Current focus</text>
  <text x="470" y="344" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- cold-start automation</text>
  <text x="470" y="372" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- assistant/taskpane reliability</text>
  <text x="470" y="400" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- macro-bench execution loop</text>

  <text x="842" y="220" fill="#163845" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">WPP</text>
  <text x="842" y="260" fill="#5b6668" font-size="19" font-family="Segoe UI, Arial, sans-serif">Presentation creation, outline expansion, slides, shapes, and layout-oriented writeback.</text>
  <text x="842" y="314" fill="#9b5620" font-size="18" font-family="Segoe UI, Arial, sans-serif">Automation goal</text>
  <text x="842" y="344" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- open assistant reliably</text>
  <text x="842" y="372" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- run slide generation suites</text>
  <text x="842" y="400" fill="#5b6668" font-size="18" font-family="Segoe UI, Arial, sans-serif">- verify actual slide changes</text>
</svg>
